  .app { display: flex; height: 100vh; overflow: hidden; }
  .sidebar { width: 220px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }

  .nav-item { display: flex; align-items: center; gap: 8px; padding: 8px 16px; font-size: 13px; color: #555; cursor: pointer; border-radius: 0; transition: background .1s; border-left: 2px solid transparent; }

  .topbar-title { font-size: 15px; font-weight: 500; flex: 1; }
  .topbar-actions { display: flex; gap: 8px; align-items: center; }
  .content { flex: 1; overflow-y: auto; padding: 24px; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid transparent; transition: all .15s; }

  .btn-danger { background: var(--red-light); color: var(--red); border-color: #f0c0c0; }
  .btn-danger:hover { background: #f5d5d5; }
  .btn-success { background: var(--green-light); color: var(--green); border-color: #b8dca0; }
  .btn-amber { background: var(--amber-light); color: var(--amber); border-color: #f0c888; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 100px; font-size: 11px; font-weight: 500; }
  .badge-purple { background: var(--purple-light); color: var(--purple); }
  .badge-green { background: var(--green-light); color: var(--green); }
  .badge-amber { background: var(--amber-light); color: var(--amber); }
  .badge-red { background: var(--red-light); color: var(--red); }
  .badge-blue { background: var(--blue-light); color: var(--blue); }
  .badge-gray { background: var(--gray-light); color: var(--gray); }
  .card { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; }
  .card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }

  .card-body { padding: 20px; }

  .tag { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 4px; font-size: 11px; background: #f0f0f0; color: #555; margin: 2px; }

// ============================================================
// NAV
// ============================================================
function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  event && event.currentTarget && event.currentTarget.classList.add('active');
  // re-highlight
  document.querySelectorAll('.nav-item').forEach(el => {
    if (el.getAttribute('onclick') && el.getAttribute('onclick').includes(`'${page}'`)) el.classList.add('active');
  });
  const titles = {
    'combo-catalog': 'Combo Catalog',
    'assembly-planning': 'Assembly Planning',
    'build-requests': 'Build Requests',
    'tl-approvals': 'TL Approvals',
    'picking': 'Picking',
    'packing': 'Packing',
    'putaway': 'Putaway',
    'debundle': 'De-bundling',
    'conversion-records': 'Conversion Records',
    'stock-take': 'Stock Take',
    'reports': 'Reports'
  };
  document.getElementById('page-title').textContent = titles[page] || page;
  const pages = {
    'combo-catalog': renderComboCatalog,
    'assembly-planning': renderAssemblyPlanning,
    'build-requests': renderBuildRequests,
    'tl-approvals': renderTLApprovals,
    'picking': renderPicking,
    'packing': renderPacking,
    'putaway': renderPutaway,
    'debundle': renderDebundle,
    'conversion-records': renderConversionRecords,
    'stock-take': renderStockTake,
    'reports': renderReports
  };
  const fn = pages[page];
  document.getElementById('main-content').innerHTML = fn ? fn() : '<div class="empty-state"><div class="icon">🚧</div><p>Page coming soon</p></div>';
  if (page === 'picking') initPickingInteractions();
  if (page === 'packing') initPackingInteractions();
}

// ============================================================
// STATUS BADGE
// ============================================================
function statusBadge(status) {
  const map = {
    'ACTIVE': 'badge-green', 'COMPLETED': 'badge-green', 'CONFIGURED': 'badge-blue',
    'DRAFT': 'badge-gray', 'INACTIVE': 'badge-amber', 'BLOCKED': 'badge-red',
    'PENDING_APPROVAL': 'badge-amber', 'RESERVED': 'badge-blue', 'PICKING': 'badge-blue',
    'PICKED': 'badge-blue', 'PACKING': 'badge-purple', 'PUT_AWAY_IN_PROGRESS': 'badge-purple',
    'FAILED': 'badge-red', 'CANCELLED': 'badge-red', 'REJECTED': 'badge-red',
    'IN_PROGRESS': 'badge-blue', 'OPEN': 'badge-amber'
  };
  return `<span class="badge ${map[status] || 'badge-gray'}">${status.replace(/_/g,' ')}</span>`;
}

  const list = document.getElementById('child-sku-list');

  div.id = `csr-${idx}`;
  div.innerHTML = `
    <select class="form-control sku-qty" style="flex:1" onchange="updateGSTPreview()">
      <option value="">Select child SKU</option>
      ${store.childSkus.map(s => `<option value="${s.id}" data-gst="${s.gst}">${s.name} (GST: ${s.gst}%)</option>`).join('')}
    </select>

    <button class="remove-btn" onclick="this.parentElement.remove();updateGSTPreview()">×</button>`;

function updateGSTPreview() {
  const rows = document.querySelectorAll('#child-sku-list .child-sku-row');
  let maxGst = 0;
  rows.forEach(r => {
    const sel = r.querySelector('select');
    if (sel && sel.value) {
      const opt = sel.querySelector(`option[value="${sel.value}"]`);
      const gst = parseInt(opt?.getAttribute('data-gst') || 0);
      maxGst = Math.max(maxGst, gst);
    }
  });
  const preview = document.getElementById('gst-preview');
  if (preview && rows.length > 0) {
    preview.innerHTML = `<div class="highlight-box"><span style="font-size:12px;color:var(--purple);font-weight:600">Auto-derived GST: ${maxGst}%</span> <span style="font-size:12px;color:#888">(max of all child SKU GST rates)</span></div>`;
  }
}

function renderPlanResult() {
  const skuId = document.getElementById('plan-sku')?.value;
  const result = document.getElementById('plan-result');
  if (!skuId || !result) return;
  const combo = store.combos.find(c => c.id === skuId);
  if (!combo) return;
  let maxCombos = Infinity;
  let limitingSku = null;
  combo.children.forEach(ch => {
    const childData = store.childSkus.find(s => s.id === ch.id);
    if (childData) {
      const possible = Math.floor(childData.available / ch.qty);
      if (possible < maxCombos) { maxCombos = possible; limitingSku = ch.name; }
    }
  });
  const pkgData = store.packagingSkus.find(p => p.id === combo.packaging?.id);
  if (pkgData) {
    const pkgPossible = pkgData.available;
    if (pkgPossible < maxCombos) { maxCombos = pkgPossible; limitingSku = combo.packaging.name + ' (packaging)'; }
  }
  if (maxCombos === Infinity) maxCombos = 0;

  result.innerHTML = `
    <div class="alert alert-blue"><span>ℹ️</span><span>This is read-only. No inventory is reserved at this stage.</span></div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px">
      <div class="stat-card"><div class="stat-label">Max Possible Combos</div><div class="stat-value" style="color:var(--purple)">${maxCombos}</div></div>
      <div class="stat-card"><div class="stat-label">Limiting Factor</div><div class="stat-value" style="font-size:16px;margin-top:8px">${limitingSku || '—'}</div></div>
      <div class="stat-card"><div class="stat-label">Packaging Available</div><div class="stat-value">${pkgData?.available || 0}</div><div class="stat-sub">${combo.packaging?.name || '—'}</div></div>
    </div>
    <div class="card" style="margin-bottom:20px">
      <div class="card-header"><h3>Child SKU Availability (FEFO sorted)</h3></div>
      <table><thead><tr><th>Child SKU</th><th>Required per Combo</th><th>Lot ID</th><th>Lot Qty</th><th>Expiry</th><th>Max Combos (this lot)</th></tr></thead>
      <tbody>
        ${combo.children.map(ch => {
          const childData = store.childSkus.find(s => s.id === ch.id);
          return (childData?.lots || []).sort((a,b)=>a.expiry.localeCompare(b.expiry)).map(lot => `
            <tr>
              <td><div style="font-weight:500">${ch.name}</div><div style="font-size:11px;color:#999">${ch.id}</div></td>
              <td>${ch.qty}</td>
              <td><span class="tag">${lot.id}</span></td>
              <td>${lot.qty}</td>
              <td>${lot.expiry}</td>
              <td><span style="font-weight:500">${Math.floor(lot.qty / ch.qty)}</span></td>
            </tr>`).join('');
        }).join('')}
      </tbody></table>
    </div>
    <div style="text-align:right">
      <button class="btn btn-primary" onclick="closeModal();showPage('build-requests');setTimeout(()=>openCreateBR('${skuId}'),100)">Proceed to Build Request →</button>
    </div>`;
}

function updateBRMax() {
  const skuId = document.getElementById('br-sku')?.value;
  const info = document.getElementById('br-max-info');
  if (!skuId || !info) return;
  const combo = store.combos.find(c => c.id === skuId);
  if (!combo) return;
  let maxCombos = 999;
  combo.children.forEach(ch => {
    const cd = store.childSkus.find(s => s.id === ch.id);
    if (cd) maxCombos = Math.min(maxCombos, Math.floor(cd.available / ch.qty));
  });
  const pkg = store.packagingSkus.find(p => p.id === combo.packaging?.id);
  if (pkg) maxCombos = Math.min(maxCombos, pkg.available);
  info.innerHTML = `<div class="highlight-box" style="margin-bottom:16px"><span style="font-size:13px;font-weight:600;color:var(--purple)">MAX_ALLOWED = ${maxCombos}</span><span style="font-size:12px;color:#888"> based on current inventory</span></div>`;
}

function submitBR() {
  const skuId = document.getElementById('br-sku')?.value;
  const qty = parseInt(document.getElementById('br-qty')?.value);
  const reason = document.getElementById('br-reason')?.value;
  if (!skuId || !qty) { showToast('Please fill all required fields', 'error'); return; }
  const combo = store.combos.find(c => c.id === skuId);
  const id = 'BR-2025-' + String(store.buildRequests.length + 1).padStart(3,'0');
  store.buildRequests.unshift({ id, comboId: skuId, comboName: combo.name, warehouse: 'Delhi-DC1',
    requestedQty: qty, approvedQty: null, status: 'PENDING_APPROVAL', raisedBy: 'Current User',
    tlApprovedBy: null, createdAt: new Date().toISOString().split('T')[0], completedAt: null,
    pickedQty: 0, packedQty: 0, finalNlc: null });
  closeModal();
  showPage('build-requests');
  showToast(`${id} submitted for TL approval`);
}

function viewBR(id) {
  const br = store.buildRequests.find(x => x.id === id);
  if (!br) return;
  const combo = store.combos.find(c => c.id === br.comboId);
  const steps = [
    { label: 'CREATED', done: true, active: false },
    { label: 'PENDING APPROVAL', done: br.status !== 'PENDING_APPROVAL', active: br.status === 'PENDING_APPROVAL' },
    { label: 'RESERVED', done: !['PENDING_APPROVAL','CREATED'].includes(br.status), active: br.status === 'RESERVED' },
    { label: 'PICKING', done: ['PICKED','PACKING','PUT_AWAY_IN_PROGRESS','COMPLETED'].includes(br.status), active: br.status === 'PICKING' },
    { label: 'PACKING', done: ['PUT_AWAY_IN_PROGRESS','COMPLETED'].includes(br.status), active: br.status === 'PACKING' },
    { label: 'COMPLETED', done: br.status === 'COMPLETED', active: false }
  ];
  openModal(`
    <div class="modal modal-lg">
      <div class="modal-header"><h2>${br.id}</h2><button class="modal-close" onclick="closeModal()">×</button></div>
      <div class="modal-body">
        <div style="display:flex;gap:8px;margin-bottom:20px">${statusBadge(br.status)}<span class="badge badge-gray">${br.warehouse}</span></div>
        <div class="flow-bar" style="margin-bottom:20px">
          ${steps.map(s=>`<div class="flow-step" style="background:${s.done?'var(--green-light)':s.active?'var(--purple-light)':'#f0f0f0'};color:${s.done?'var(--green)':s.active?'var(--purple)':'#999'}">${s.done?'✓ ':s.active?'● ':''}${s.label}</div><div class="flow-arrow">→</div>`).join('').slice(0,-37)}
        </div>
        <div class="grid-2" style="gap:20px">
          <div>

function renderTLApprovals() {
  const pending = store.buildRequests.filter(b => b.status === 'PENDING_APPROVAL');

      const combo = store.combos.find(c => c.id === br.comboId);
      let maxCombos = 999;
      combo?.children.forEach(ch => {

      return `
      <div class="card" style="margin-bottom:16px">

            </div>

              <div class="section-heading">Child SKU Availability</div>
              ${combo?.children.map(ch => {

              <span id="aqv-${br.id}" style="font-size:18px;font-weight:700;color:var(--purple);min-width:30px">${Math.min(br.requestedQty, maxCombos)}</span>

          </div>
          <div style="display:flex;gap:8px">
            <button class="btn btn-success" onclick="approveBR('${br.id}')">✓ Approve & Reserve Inventory</button>
            <button class="btn btn-danger" onclick="rejectBR('${br.id}')">✗ Reject</button>
          </div>
        </div>
      </div>`}).join('')}`;
}

function initPackingInteractions() {
  store.buildRequests.filter(b => b.status === 'PACKING').forEach(br => updatePackVariance(br.id));
}

function updatePackVariance(brId) {
  const br = store.buildRequests.find(x => x.id === brId);
  const qty = parseInt(document.getElementById(`pack-qty-${brId}`)?.value) || 0;
  const variance = document.getElementById(`pack-variance-${brId}`);
  if (!variance) return;
  if (qty < br.approvedQty) {
    const loss = br.approvedQty - qty;
    variance.innerHTML = `<div class="alert alert-amber"><span>⚠️</span><span>Variance detected: ${loss} units short. Will be recorded as <strong>Yield Loss</strong>.</span></div>`;
  } else if (qty === br.approvedQty) {
    variance.innerHTML = `<div class="alert alert-green"><span>✓</span><span>Packed quantity matches approved quantity. No variance.</span></div>`;
  }
}

function confirmPacking(id) {
  const br = store.buildRequests.find(x => x.id === id);
  const qty = parseInt(document.getElementById(`pack-qty-${id}`)?.value) || 0;
  if (qty === 0) { openPostPackDisposition(id, br.approvedQty); return; }
  br.packedQty = qty;
  br.status = 'PUT_AWAY_IN_PROGRESS';
  showToast(`Packing confirmed. Stock take auto-triggered warehouse-wide.`);
  openPostPackDisposition(id, br.approvedQty - qty);
}

function openPostPackDisposition(brId, leftover) {
  const br = store.buildRequests.find(x => x.id === brId);
  const combo = store.combos.find(c => c.id === br.comboId);
  openModal(`
    <div class="modal modal-lg">
      <div class="modal-header"><h2>Post-Pack Disposition</h2><button class="modal-close" onclick="closeModal()">×</button></div>
      <div class="modal-body">
        <div class="alert alert-amber"><span>⚠️</span><span>Both options must be actioned before proceeding to combo putaway.</span></div>
        <div style="font-size:13px;color:#666;margin-bottom:20px">
          <strong>${leftover > 0 ? leftover + ' units' : 'All units'}</strong> of child SKUs remain unpacked.
        </div>
        <div class="grid-2" style="gap:16px">
          <div class="card" style="border:2px solid var(--purple-light)">
            <div class="card-body">
              <div style="font-weight:600;color:var(--purple);margin-bottom:8px">Option A — New Build Request</div>
              <div style="font-size:13px;color:#666;margin-bottom:12px">Generate pick list for only the shortfall SKU qty to complete additional combos.</div>
              ${combo?.children.map(ch => `<div style="font-size:13px;margin-bottom:4px">${ch.name}: need ${leftover * ch.qty} more</div>`).join('')}

            </div>
          </div>
          <div class="card" style="border:2px solid var(--green-light)">
            <div class="card-body">
              <div style="font-weight:600;color:var(--green);margin-bottom:8px">Option B — Putaway Remaining</div>
              <div style="font-size:13px;color:#666;margin-bottom:12px">Return units to available inventory in their original bins.</div>
              ${combo?.children.map(ch => `<div style="font-size:13px;margin-bottom:4px">${ch.name}: ${leftover * ch.qty} units → BIN-A0${combo.children.indexOf(ch)+1}</div>`).join('')}
              <button class="btn btn-success btn-sm" style="margin-top:12px" onclick="confirmPutawayRemaining('${brId}')">Return to Inventory</button>

        </div>
        <div style="margin-top:16px;background:#f5f5f5;border-radius:8px;padding:12px">
          <div style="font-size:12px;font-weight:600;color:#555;margin-bottom:6px">Damaged Unit Handling</div>
          <div style="font-size:12px;color:#888">Mark damaged units as Yield Loss. Stock take auto-triggered warehouse-wide for affected child SKU.</div>
        </div>
      </div>
    </div>`);
}

  showToast('Remaining units returned to inventory');
  showPage('putaway');
}

function renderPutaway() {
  const ready = store.buildRequests.filter(b => b.status === 'PUT_AWAY_IN_PROGRESS');
  return `
    <div style="margin-bottom:20px">
      <div style="font-size:20px;font-weight:600">Putaway</div>

    </div>
    <div class="alert alert-blue"><span>⚡</span><span>Putaway is <strong>atomic</strong>: Child SKU deduction + Parent inventory creation + Final NLC + Conversion Record all succeed or rollback together.</span></div>
    ${ready.length === 0 ? `<div class="empty-state"><div class="icon">🏷️</div><p>No items awaiting putaway</p></div>` :
    ready.map(br => {
      const combo = store.combos.find(c => c.id === br.comboId);
      const nlc = combo ? combo.children.reduce((s, ch) => s + ch.nlc * ch.qty, 0) + (combo.packaging?.cost || 0) : 0;
      return `
      <div class="card" style="margin-bottom:20px">
        <div class="card-header">
          <div><div style="font-weight:600">${br.id} — ${br.comboName}</div><div style="font-size:12px;color:#999">${br.packedQty} combos packed · ${br.warehouse}</div></div>

        </div>

          <div class="grid-2" style="gap:20px">
            <div>
              <div class="section-heading">Putaway Details</div>
              <div class="info-row"><div class="info-label">Combo SKU</div><div class="info-value">${br.comboId}</div></div>
              <div class="info-row"><div class="info-label">Packed Quantity</div><div class="info-value" style="font-weight:700;font-size:18px">${br.packedQty}</div></div>
              <div class="info-row"><div class="info-label">Destination Bin</div><div class="info-value">COMBO-BIN-01</div></div>
              <div class="info-row"><div class="info-label">Parent Lot ID</div><div class="info-value">LOT-${br.comboId}-${br.createdAt?.replace(/-/g,'')}</div></div>
              <div class="info-row"><div class="info-label">Parent Lot Expiry</div><div class="info-value">2025-11-15 (min child expiry)</div></div>
            </div>
            <div>
              <div class="section-heading">NLC Computation Preview</div>
              <div class="nlc-formula">NLC = Σ(child_lot_NLC × qty) + pkg_cost</div>
              ${combo?.children.map(ch => `<div style="font-size:12px;color:#666;margin-top:6px">${ch.name}: ₹${ch.nlc} × ${ch.qty * br.packedQty} = ₹${ch.nlc * ch.qty * br.packedQty}</div>`).join('')}
              <div style="font-size:12px;color:#666;margin-top:4px">Packaging: ₹${combo?.packaging?.cost || 0} × ${br.packedQty} = ₹${(combo?.packaging?.cost || 0) * br.packedQty}</div>
              <div style="font-size:14px;font-weight:700;color:var(--purple);margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">Final NLC per combo: ₹${nlc.toFixed(2)}</div>

              <input class="form-control" id="putaway-bin-${br.id}" placeholder="Scan COMBO-BIN-01..." style="flex:1">
              <button class="btn btn-primary" onclick="confirmPutaway('${br.id}', ${nlc})">Confirm Putaway</button>
            </div>
          </div>
        </div>
      </div>`}).join('')}`;
}

function confirmPutaway(brId, nlc) {
  const br = store.buildRequests.find(x => x.id === brId);
  br.status = 'COMPLETED';
  br.finalNlc = nlc;
  br.completedAt = new Date().toISOString().split('T')[0];
  // Create conversion record
  const combo = store.combos.find(c => c.id === br.comboId);
  combo.inventory += br.packedQty;
  const crId = 'CR-' + brId;
  store.conversionRecords.push({
    id: crId, brId, comboId: br.comboId, comboName: br.comboName,
    parentLotId: `LOT-${br.comboId}-${br.completedAt?.replace(/-/g,'')}`,
    finalQty: br.packedQty, requestedQty: br.requestedQty, approvedQty: br.approvedQty,
    pickedQty: br.pickedQty, packedQty: br.packedQty, finalNlc: nlc, gst: combo?.gst,
    warehouse: br.warehouse, raisedBy: br.raisedBy, tlApprovedBy: br.tlApprovedBy,
    putawayBy: 'Current User', timestamp: new Date().toLocaleString(), stockTakeTaskId: 'ST-NEW-001',
    children: combo?.children.map(ch => ({ skuId: ch.id, name: ch.name, lotId: 'LOT-'+ch.id+'-A', qty: ch.qty * br.packedQty, nlc: ch.nlc })) || [],
    packaging: { skuId: combo?.packaging?.id, name: combo?.packaging?.name, qty: br.packedQty, cost: combo?.packaging?.cost || 0 }
  });
  showToast(`✅ Putaway complete. Conversion Record ${crId} created. ${br.packedQty} combos now promiseable.`);
  showPage('conversion-records');
}

      <div style="font-size:12px;color:#999;margin-top:2px">Physically reverse built combos back into component child SKUs</div>
    </div>
    <div class="alert alert-amber"><span>⚠️</span><span>De-bundling requires the combo SKU to be <strong>INACTIVE</strong>. Only non-promised units can be de-bundled.</span></div>
    <div class="grid-2" style="gap:20px;align-items:start">
      <div>
        <div class="card" style="margin-bottom:16px">

          `<table><thead><tr><th>Combo</th><th>Status</th><th>Stock</th><th></th></tr></thead><tbody>
          ${eligible.map(c => `<tr><td><div style="font-weight:500">${c.id}</div><div style="font-size:11px;color:#999">${c.name}</div></td><td>${statusBadge(c.status)}</td><td>${c.inventory}</td><td><button class="btn btn-amber btn-sm" onclick="openDebundleRequest('${c.id}')">De-bundle</button></td></tr>`).join('')}
          </tbody></table>`}
        </div>
        <div class="card">
          <div class="card-header"><h3>De-bundle History</h3></div>
          <table><thead><tr><th>ID</th><th>Combo</th><th>Qty</th><th>Status</th><th>Raised By</th></tr></thead>
          <tbody>
          ${store.debundleRequests.map(db => `<tr><td>${db.id}</td><td>${db.comboName}</td><td>${db.qty}</td><td>${statusBadge(db.status)}</td><td>${db.raisedBy}</td></tr>`).join('')}
          </tbody></table>
        </div>
      </div>
      <div>
        <div class="card">
          <div class="card-header"><h3>De-bundle Flow</h3></div>
          <div class="card-body">
            <div class="timeline">
              ${[['CREATED','Raised by Ops, Category, or Finance. References Conversion Record.','🟠'],['IN PROGRESS','Picker physically retrieves combo units from bin via picker app.','🔵'],['COMPLETED','Child SKUs put away to original bins. Reversal Record created.','🟢']].map((s,i,arr)=>`
                <div class="timeline-step">
                  <div class="timeline-left">
                    <div class="timeline-dot" style="background:${['var(--amber-light)','var(--blue-light)','var(--green-light)'][i]};color:${['var(--amber)','var(--blue)','var(--green)'][i]};font-size:16px">${s[2]}</div>
                    ${i < arr.length-1 ? '<div class="timeline-line"></div>' : ''}

}

function openDebundleRequest(comboId) {
  const combo = store.combos.find(c => c.id === comboId);
  const cr = store.conversionRecords.find(c => c.comboId === comboId);
  openModal(`
    <div class="modal modal-lg">
      <div class="modal-header"><h2>De-bundle Request — ${combo.name}</h2><button class="modal-close" onclick="closeModal()">×</button></div>
      <div class="modal-body">
        <div class="alert alert-amber"><span>⚠️</span><span>This is a physical warehouse operation. A picker will physically retrieve and unpack combos.</span></div>
        <div class="form-group">
          <label class="form-label">Reference Conversion Record</label>
          <select class="form-control">
            ${cr ? `<option value="${cr.id}">${cr.id} — ${cr.finalQty} units built on ${cr.timestamp}</option>` : `<option>No conversion records found</option>`}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Quantity to De-bundle (max: ${combo.inventory})</label>
          <input type="number" class="form-control" id="db-qty" value="${combo.inventory}" max="${combo.inventory}" min="1">
        </div>
        <div class="form-group">
          <label class="form-label">Packaging Handling</label>
          <select class="form-control" id="db-pkg">
            <option value="damaged">Mark packaging as damaged (write-off)</option>
            <option value="restore">Restore packaging to stock</option>
          </select>
        </div>
        ${cr ? `
        <div class="section-heading" style="margin-top:4px">Child SKUs to be Returned</div>
        <table><thead><tr><th>Child SKU</th><th>Return Lot</th><th>Qty per Combo</th><th>Total Return</th></tr></thead>
        <tbody>
          ${cr.children.map(ch => `<tr><td>${ch.name}</td><td><span class="tag">${ch.lotId}</span></td><td>${Math.round(ch.qty/cr.finalQty)}</td><td id="db-ch-${ch.skuId}">${ch.qty}</td></tr>`).join('')}
        </tbody></table>` : ''}
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-amber" onclick="submitDebundle('${comboId}')">Create De-bundle Request</button>
      </div>
    </div>`);
}

function submitDebundle(comboId) {
  const combo = store.combos.find(c => c.id === comboId);
  const qty = parseInt(document.getElementById('db-qty')?.value) || 0;
  const id = 'DB-2025-' + String(store.debundleRequests.length + 1).padStart(3,'0');
  combo.inventory -= qty;
  store.debundleRequests.push({ id, comboId, comboName: combo.name, crId: 'CR-001', qty, status: 'COMPLETED', raisedBy: 'Current User', warehouse: 'Delhi-DC1', completedAt: new Date().toISOString().split('T')[0] });
  closeModal();
  showPage('debundle');
  showToast(`${id} de-bundle completed. Reversal Record created. Child SKUs returned to inventory.`);
}

// ============================================================
// MODAL UTILS
// ============================================================
function openModal(html) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'modal-overlay';
  overlay.innerHTML = html;
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  document.getElementById('modals').appendChild(overlay);
}

function closeModal() {
  const m = document.getElementById('modal-overlay');
  if (m) m.remove();
}

// ============================================================
// TOAST
// ============================================================
function showToast(msg, type = 'success') {
  const existing = document.getElementById('toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.id = 'toast';
  const colors = { success: ['var(--green-light)','var(--green)','#b8dca0'], error: ['var(--red-light)','var(--red)','#f0c0c0'], warning: ['var(--amber-light)','var(--amber)','#f0c888'] };
  const [bg, color, border] = colors[type] || colors.success;
  t.style.cssText = `position:fixed;bottom:24px;right:24px;background:${bg};color:${color};border:1px solid ${border};padding:12px 18px;border-radius:10px;font-size:13px;font-weight:500;z-index:9999;max-width:400px;box-shadow:0 4px 20px rgba(0,0,0,.1);animation:slideIn .2s ease`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

// Animation
const style = document.createElement('style');
style.textContent = `@keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }`;
document.head.appendChild(style);

// ============================================================
// INIT
// ============================================================
showPage('combo-catalog');
